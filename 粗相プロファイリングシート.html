var answers={};
var openPanel=null;

function render(){
  var html="";
  CATS.forEach(function(c){
    html+='<div class="ch"><span class="ci">'+c.icon+'</span><div><div class="ct">'+c.title+'</div><div class="cd">'+c.desc+'</div></div></div>';
    QS.filter(function(q){return q.cat===c.id;}).forEach(function(q){
      html+='<div class="qc"><span class="qn">Q'+q.id+'</span><span class="qt">'+q.text+'</span>'
           +'<div class="yn">'
           +'<button class="yb" id="y'+q.id+'" onclick="ans('+q.id+',true)">はい</button>'
           +'<button class="nb" id="n'+q.id+'" onclick="ans('+q.id+',false)">いいえ</button>'
           +'</div></div>';
    });
    html+='<div class="gap"></div>';
  });
  document.getElementById("qs").innerHTML=html;
}

function ans(id,val){
  answers[id]=val;
  var yEl=document.getElementById("y"+id);
  var nEl=document.getElementById("n"+id);
  if(val){
    yEl.className="yb on";
    nEl.className="nb";
  } else {
    yEl.className="yb";
    nEl.className="nb on";
  }
  var count=Object.keys(answers).length;
  document.getElementById("pb").style.width=Math.round(count/50*100)+"%";
  document.getElementById("pl").textContent=count+" / 50 問回答済み";
}

function calcRisk(catId){
  var qs=QS.filter(function(q){return q.cat===catId;});
  var risk=0;
  qs.forEach(function(q){
    if(answers[q.id]===undefined)return;
    if(q.risk===1&&answers[q.id]===true)risk++;
    if(q.risk===0&&answers[q.id]===false)risk++;
  });
  return{risk:risk,total:qs.length};
}

function riskLevel(score,max){
  var r=score/max;
  if(r>=0.6)return"hih";
  if(r>=0.35)return"mid";
  return"low";
}

function toggleDetail(catId){
  var panel=document.getElementById("dp-"+catId);
  if(!panel)return;
  if(panel.classList.contains("show")){
    panel.classList.remove("show");
    var card=document.getElementById("card-"+catId);
    if(card)card.classList.remove("active");
    openPanel=null;
  } else {
    // 他を閉じる
    CATS.forEach(function(c){
      var p=document.getElementById("dp-"+c.id);
      if(p)p.classList.remove("show");
      var cd=document.getElementById("card-"+c.id);
      if(cd)cd.classList.remove("active");
    });
    panel.classList.add("show");
    var card=document.getElementById("card-"+catId);
    if(card)card.classList.add("active");
    openPanel=catId;
    setTimeout(function(){panel.scrollIntoView({behavior:"smooth",block:"nearest"});},100);
  }
}

function showResult(){
  if(Object.keys(answers).length<40){
    var w=document.getElementById("warn");
    w.className="warn show";
    w.scrollIntoView({behavior:"smooth"});
    return;
  }
  document.getElementById("warn").className="warn";
  var res=document.getElementById("res");
  res.className="res show";
  res.scrollIntoView({behavior:"smooth"});

  var catLabels={env:"排泄環境",time:"行動タイムライン",rel:"多頭関係と動線",cln:"対策と掃除",lif:"生活環境の変化"};
  var rgHtml="";
  var daHtml="";

  CATS.forEach(function(c){
    var s=calcRisk(c.id);
    var lv=riskLevel(s.risk,s.total);
    var cls=lv==="hih"?"hih":lv==="mid"?"mid":"low";
    var lbl=lv==="hih"?"リスク高":lv==="mid"?"要注意":"良好";

    rgHtml+='<div class="rc '+cls+'" id="card-'+c.id+'" onclick="toggleDetail(\''+c.id+'\')">'
      +'<div class="rl">'+c.icon+' '+catLabels[c.id]+'</div>'
      +'<div class="rn">'+s.risk+'<span class="rm"> / '+s.total+'</span></div>'
      +'<div class="rs-label">'+lbl+' ▾</div>'
      +'</div>';

    var ex=EXPLANATIONS[c.id][lv];
    daHtml+='<div class="detail-panel dp-'+cls+'" id="dp-'+c.id+'">'
      +'<div class="dp-head">'+ex.head+'</div>'
      +'<div class="dp-body">'+ex.body+'</div>'
      +'</div>';
  });

  document.getElementById("rg").innerHTML=rgHtml;
  document.getElementById("detail-area").innerHTML=daHtml+'<div class="dp-hint">↑ カードをもう一度タップすると閉じます</div>';
}

render();
</script>
</body>
</html>
